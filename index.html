    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;700&display=swap');
        
        :root {
            /* Core Colors */
            --neon-green: #39FF14;      /* Player 1 / Main UI Color */
            --neon-pink: #FF0080;       /* Player 2 Color */
            --dark-bg: #0D1225;         /* Deep Space Dark */
            --card-bg: #1A213B;         /* Card/Modal Background */
            --text-primary: #E0E0FF;
            --text-secondary: #B0B0C0;
            
            /* Effects */
            --glow-green: 0 0 10px var(--neon-green), 0 0 20px var(--neon-green);
            --glow-pink: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink);
            --border-default: 2px solid var(--neon-green);
            --shadow-dark: 0 15px 30px rgba(0, 0, 0, 0.7);
            
            --neon-color: var(--neon-green); /* Backward compatibility */
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, var(--dark-bg) 0%, #080C1A 100%);
            min-height: 100vh;
            height: 100vh;
            color: var(--text-primary);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        /* --- Canvas & Game Area --- */
        #gameCanvas {
            /* DÜZELTME 1: Canvas boyutları ve görünürlük kısıtlamaları kaldırıldı. */
            border: 2px solid var(--neon-color);
            border-radius: 12px;
            background: #050B15;
            box-shadow: var(--shadow-dark);
            filter: drop-shadow(var(--glow-green));
            
            /* Canvas'ın orijinal HTML boyutu geçerli olmalı: width="400" height="400" */
            display: block; 
            margin: 20px auto; 
            transition: all 0.5s ease;
            
            /* Hatalı kısıtlamalar kaldırıldı: */
            /* width: 400px !important; */
            /* height: 400px !important; */
            /* max-width: 400px !important; */
            /* max-height: 400px !important; */
        }
        
        /* Bu class, canvas'ın boyutunu dinamik değiştirdiği için kaldırıldı. */
        /* .game-started #gameCanvas { 
            width: 350px !important;
            height: 600px !important;
        } */
        
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        /* --- Scoreboard --- */
        .scoreboard-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            /* DÜZELTME 2: Maksimum genişlik 550px'ten 450px'e düşürüldü. */
            max-width: 450px; 
            z-index: 20;
            display: none;
            pointer-events: all;
        }
        
        .scoreboard-container.show {
            display: block;
        }
        
        .scoreboard-rectangle {
            background: rgba(10, 10, 25, 0.7);
            border: 1px solid var(--neon-color); /* Neon yeşil border kullanıldı */
            border-radius: 10px;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(5px);
            box-shadow: var(--shadow-dark);
            margin-bottom: 10px;
            gap: 5px; /* DÜZELTME 2: Boşluk azaltıldı */
        }
        
        .player-section {
            display: flex;
            align-items: center;
            gap: 5px; /* DÜZELTME 2: Boşluk azaltıldı */
        }
        
        .player-avatar {
            width: 35px; /* DÜZELTME 2: Avatar boyutu 40px'ten 35px'e düşürüldü */
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            transition: all 0.3s;
        }
        
        .player-avatar.player1 {
            border: 2px solid var(--neon-green);
            box-shadow: var(--glow-green);
        }
        
        .player-avatar.player2 {
            border: 2px solid var(--neon-pink);
            box-shadow: var(--glow-pink);
        }
        
        .player-name {
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 13px; /* DÜZELTME 2: Yazı boyutu 14px'ten 13px'e düşürüldü */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80px; /* DÜZELTME 2: İsim uzunluğu kısıtlandı */
        }
        
        .player-score {
            color: var(--neon-green);
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 22px; /* DÜZELTME 2: Skor boyutu 24px'ten 22px'e düşürüldü */
            min-width: 25px;
            text-align: center;
            text-shadow: 0 0 5px var(--neon-green);
        }
        
        #score2 {
            color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
        }
        
        .score-divider {
            color: var(--text-secondary);
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 18px; /* DÜZELTME 2: Ayırıcı boyutu 20px'ten 18px'e düşürüldü */
            margin: 0 5px;
        }
        
        .timer-container {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            text-align: center;
        }
        
        .timer-text {
            color: var(--neon-color);
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 16px; /* DÜZELTME 2: Zamanlayıcı boyutu 18px'ten 16px'e düşürüldü */
            background: rgba(10, 10, 25, 0.8);
            padding: 5px 15px;
            border-radius: 10px;
            border: 1px solid var(--neon-color);
            box-shadow: var(--glow-green);
            display: inline-block;
        }
        
        /* --- Modals (Game Mode Selection & Game Over) --- */
        .game-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 25, 0.95);
            color: var(--text-primary);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--neon-color);
            text-align: center;
            z-index: 20;
            box-shadow: var(--shadow-dark), 0 0 15px rgba(57, 255, 20, 0.8);
            backdrop-filter: blur(15px);
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .game-mode-selection {
            /* Copied from .game-modal */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 25, 0.95);
            color: var(--text-primary);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--neon-color);
            text-align: center;
            z-index: 20;
            box-shadow: var(--shadow-dark), 0 0 15px rgba(57, 255, 20, 0.8);
            backdrop-filter: blur(15px);
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
            
            display: block; /* Original display rule */
        }
        
        .game-mode-selection h2 {
            margin: 0 0 30px 0;
            font-size: 32px;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 15px var(--neon-color);
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        /* --- User Info Card --- */
        .user-info-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--neon-color); /* Border rengi düzeltildi */
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }
        
        .user-info-content {
            display: flex;
            align-items: center;
            gap: 15px;
            justify-content: center;
        }
        
        .user-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 3px solid var(--neon-green);
            box-shadow: var(--glow-green);
            transition: all 0.3s;
        }
        
        .user-details h3 {
            margin: 0 0 3px 0;
            font-size: 20px;
            font-weight: 700;
            color: var(--neon-green);
            font-family: 'Orbitron', sans-serif;
        }
        
        .user-status {
            font-size: 14px;
            color: var(--text-secondary);
            opacity: 0.9;
        }
        
        /* --- Mode Buttons --- */
        .mode-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-direction: row;
            align-items: stretch;
            flex-wrap: wrap; /* Esneklik için eklendi */
        }
        
        .mode-btn {
            background: var(--card-bg);
            border: 1px solid var(--neon-color);
            color: var(--neon-color);
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 200px;
            flex: 1;
            max-width: 250px;
            text-align: center;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            font-family: 'Inter', sans-serif;
        }
        
        .mode-btn:hover {
            background: var(--neon-color);
            color: var(--dark-bg);
            box-shadow: var(--glow-green);
            transform: translateY(-5px) scale(1.02);
        }
        
        .mode-icon {
            font-size: 48px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        
        .mode-btn:hover .mode-icon {
            filter: none;
        }
        
        .mode-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        
        .mode-desc {
            font-size: 13px;
            opacity: 0.7;
            line-height: 1.4;
        }
        
        /* --- Game Over Screen --- */
        .game-over {
            /* Copied from .game-modal */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 25, 0.95);
            color: var(--text-primary);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--neon-color);
            text-align: center;
            z-index: 20;
            box-shadow: var(--shadow-dark), 0 0 15px rgba(57, 255, 20, 0.8);
            backdrop-filter: blur(15px);
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
            
            display: none; /* Original display rule */
        }
        
        .game-over h2 {
            margin: 0 0 20px 0;
            font-size: 36px;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 20px gold;
            font-weight: 800;
            color: gold;
        }
        
        .final-scoreboard {
            padding: 15px 10px; /* DÜZELTME 2: Padding azaltıldı */
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; /* DÜZELTME 2: Gap azaltıldı */
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid var(--neon-color); /* Border rengi düzeltildi */
            flex-wrap: wrap; /* DÜZELTME 2: Mobil uyumluluk için eklendi */
        }
        
        .final-player-section {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-direction: column;
            text-align: center;
        }
        
        .final-player-avatar {
            width: 50px; /* DÜZELTME 2: Avatar boyutu 60px'ten 50px'e düşürüldü */
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .final-player-avatar.player1 {
            border: 4px solid var(--neon-green);
            box-shadow: var(--glow-green);
        }
        
        .final-player-avatar.player2 {
            border: 4px solid var(--neon-pink);
            box-shadow: var(--glow-pink);
        }
        
        .final-player-name {
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 14px;
            max-width: 100px; /* İsim uzunluğu kısıtlandı */
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .final-player-score {
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 30px; /* DÜZELTME 2: Skor boyutu 36px'ten 30px'e düşürüldü */
            min-width: 30px;
            text-align: center;
        }
        
        #finalScore1 {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }
        
        #finalScore2 {
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }
        
        .final-score-divider {
            color: var(--text-secondary);
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 24px; /* DÜZELTME 2: Ayırıcı boyutu 30px'ten 24px'e düşürüldü */
            margin: 0 5px;
        }
        
        .winner-display h3 {
            color: gold;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 24px; /* DÜZELTME 2: Başlık boyutu 28px'ten 24px'e düşürüldü */
            text-shadow: 0 0 15px gold;
            margin: 0;
            word-wrap: break-word; /* Uzun isimler için kelime kırmayı etkinleştir */
            max-width: 300px;
        }
        
        .game-over-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .restart-btn {
            background: var(--neon-green);
            color: var(--dark-bg);
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 800;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(57, 255, 20, 0.4);
            text-transform: uppercase;
        }
        
        .restart-btn:last-child {
            background: var(--neon-pink);
            color: var(--dark-bg);
            box-shadow: 0 4px 15px rgba(255, 0, 128, 0.4);
        }
        
        .restart-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 25px var(--neon-color);
            opacity: 0.9;
        }
        
        /* --- Farcaster Duel Search Modal Styles (for JS injection) --- */
        .duel-modal-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        
        .duel-search-box {
            background: var(--dark-bg);
            border: 2px solid var(--neon-color);
            border-radius: 15px;
            padding: 25px;
            width: 350px;
            max-width: 90vw;
            box-shadow: var(--shadow-dark), 0 0 10px rgba(57, 255, 20, 0.8);
        }
        
        .duel-title {
            color: var(--neon-color);
            text-align: center;
            margin-bottom: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 8px var(--neon-color);
        }
        
        .duel-input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-color);
            border-radius: 8px;
            color: var(--neon-color);
            font-family: 'Inter', sans-serif;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        
        .duel-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }
        
        .duel-input:focus {
            outline: none;
            border-color: var(--neon-pink);
            box-shadow: 0 0 10px var(--neon-pink);
        }
        
        .duel-close-btn {
            width: 100%;
            padding: 10px;
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--neon-color); /* Border rengi düzeltildi */
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .duel-close-btn:hover {
            background: var(--neon-pink);
            color: var(--dark-bg);
            border-color: var(--neon-pink);
        }
        
        .duel-search-results {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 15px;
        }
        
        .duel-search-results::-webkit-scrollbar {
            width: 6px;
        }
        
        .duel-search-results::-webkit-scrollbar-thumb {
            background-color: var(--neon-green);
            border-radius: 3px;
        }
        
        .duel-user-div {
            padding: 8px;
            border: 1px solid var(--neon-color); /* Border rengi düzeltildi */
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .duel-user-div:hover {
            background: rgba(57, 255, 20, 0.1);
            border-color: var(--neon-green);
            box-shadow: 0 0 5px var(--neon-green);
        }
        
        .duel-user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid var(--neon-green);
            object-fit: cover;
        }
        
        .duel-username {
            font-weight: bold;
            color: var(--neon-green);
        }

    <script>
        // Global variables

        window.sdk = null;

        // Load Farcaster SDK dynamically

            try {
                const { sdk } = await import('https://esm.sh/@farcaster/miniapp-sdk');
                window.sdk = sdk;
                console.log('✅ Farcaster SDK loaded:', sdk);
                return sdk;
            } catch (error) {
                console.error('❌ Failed to load Farcaster SDK:', error);
                return null;
            }
        }
        
        // Load SDK immediately
        loadFarcasterSDK();
        
        // Test function to verify script is loading

                    cache: 'no-cache',

                        'Expires': '0'

        window.startFarcasterDuel = async function() {
            console.log('⚔️ Starting Farcaster duel...');
            
            // Create search modal
            const modal = document.createElement('div');
            modal.classList.add('duel-modal-bg'); // Apply new class for background and centering
            
            const searchBox = document.createElement('div');
            searchBox.classList.add('duel-search-box'); // Apply new class for modal box styling
            
            const title = document.createElement('h3');
            title.textContent = '⚔️ Farcaster Duel';
            title.classList.add('duel-title'); // Apply new class for title styling
            
            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = 'Enter Farcaster username...';
            input.classList.add('duel-input'); // Apply new class for input styling
            
            const closeBtn = document.createElement('button');
            closeBtn.textContent = 'Close';
            closeBtn.classList.add('duel-close-btn'); // Apply new class for button styling
            
            const results = document.createElement('div');
            results.id = 'search-results';
            results.classList.add('duel-search-results'); // Apply new class for results area
            
            searchBox.appendChild(title);
            searchBox.appendChild(input);
            searchBox.appendChild(results); // Changed order to match professional flow: Input, Results, Close
            searchBox.appendChild(closeBtn); 
            modal.appendChild(searchBox);
            document.body.appendChild(modal);
            
            // Search function
            const searchUsers = async (query) => {
                if (!query.trim()) return;
                
                console.log('🔍 Searching for user:', query);
                results.innerHTML = '<div style="color: var(--neon-green); text-align: center; font-family: \'Inter\';">Searching...</div>';
                
                try {
                    const response = await fetch(`https://bouncingballs.ataskira1.workers.dev/search?q=${encodeURIComponent(query)}`);
                    const data = await response.json();
                    
                    console.log('🔍 Search response:', data);
                    
                    results.innerHTML = '';
                    
                    if (data.result && data.result.users && data.result.users.length > 0) {
                        data.result.users.forEach(user => {
                            const userDiv = document.createElement('div');
                            userDiv.classList.add('duel-user-div');
                            
                            userDiv.innerHTML = `
                                <img src="${user.pfp_url || 'https://picsum.photos/40/40'}" 
                                     class="duel-user-avatar">
                                <div>
                                    <div class="duel-username">${user.display_name || user.username}</div>
                                    <div class="duel-fidsmall">@${user.username}</div>
                                    <div class="duel-fidsmall">${user.follower_count || 0} followers</div>
                                </div>
                            `;
                            
                            userDiv.onclick = () => {
                                console.log('🎯 Selected user:', user);
                                
                                window.opponentUser = {
                                    username: user.username,
                                    displayName: user.display_name || user.username,
                                    pfpUrl: user.pfp_url || 'https://picsum.photos/100/100',
                                    followerCount: user.follower_count,
                                    verified: user.power_badge || false,
                                    fid: user.fid
                                };
                                document.body.removeChild(modal);
                                window.startGame();
                            };
                            results.appendChild(userDiv);
                        });
                    } else {
                        results.innerHTML = '<div style="color: var(--text-secondary); text-align: center; font-family: \'Inter\';">No users found</div>';
                    }
                } catch (error) {
                    console.error('🔍 Search error:', error);
                    results.innerHTML = '<div style="color: var(--neon-pink); text-align: center; font-family: \'Inter\';">Search error: ' + error.message + '</div>';
                }
            };
            
            // Real-time search with debouncing
            let searchTimeout;
            input.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                const query = e.target.value.trim();
                if (query.length < 2) {
                    results.innerHTML = '';
                    return;
                }
                searchTimeout = setTimeout(() => {
                    searchUsers(query);
                }, 300); // 300ms delay
            });
            
            // Event listeners
            closeBtn.onclick = () => document.body.removeChild(modal);
        };
        
        window.getFarcasterUserData = async function() {

                { username: 'dwr', display_name: 'Dan Romero', pfp_url: 'https://picsum.photos/100/100?random=2', follower_count: 100000, verified_addresses: [], power_badge: true },
                { username: 'jessepollak', display_name: 'Jesse Pollak', pfp_url: 'https://picsum.photos/100/100?random=3', follower_count: 50000, verified_addresses: [], power_badge: false },
                { username: 'dankrad', display_name: 'Dankrad Feist', pfp_url: 'https://picsum.photos/100/100?random=4', follower_count: 25000, verified_addresses: [], power_badge: false }

        window.startGame = function() {
            console.log('🎮 Starting game...');
            // Logic to transition to game screen
            document.body.classList.add('game-started');
            document.getElementById('gameModeSelection').style.display = 'none';
            document.querySelector('.scoreboard-container').classList.add('show');

            // Set up player names and avatars
            document.getElementById('player1Avatar').src = window.currentUser.pfpUrl;
            document.getElementById('player1Name').textContent = window.currentUser.displayName || `@${window.currentUser.username}`;
            document.getElementById('player2Avatar').src = window.opponentUser.pfpUrl;
            document.getElementById('player2Name').textContent = window.opponentUser.displayName || `@${window.opponentUser.username}`;

            // --- CANVAS LOGIC HERE (Simulated) ---
            // In a real game, this would initialize the canvas engine
            console.log('🏁 Game engine initialized. Game loop starts.');
            
            // Simple game loop simulation for testing UI (replace with real game logic)
            // Simulating a game duration
            let gameTime = 60;
            const timerEl = document.getElementById('timer');
            const score1El = document.getElementById('score1');
            const score2El = document.getElementById('score2');
            
            let score1 = 0;
            let score2 = 0;

            const updateScores = () => {
                score1El.textContent = score1;
                score2El.textContent = score2;
            };

            const gameInterval = setInterval(() => {
                gameTime--;
                const minutes = Math.floor(gameTime / 60);
                const seconds = gameTime % 60;
                timerEl.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                // Simulate random scoring
                if (Math.random() < 0.1 && gameTime > 0) {
                    if (Math.random() > 0.5) {
                        score1++;
                    } else {
                        score2++;
                    }
                    updateScores();
                }

                if (gameTime <= 0) {
                    clearInterval(gameInterval);
                    window.endGame(score1, score2);
                }
            }, 1000);

            window.currentGameInterval = gameInterval;
        };

        window.endGame = function(finalScore1, finalScore2) {
            console.log('🛑 Game ended.');
            document.querySelector('.scoreboard-container').classList.remove('show');

            // Show Game Over Modal
            const gameOverModal = document.getElementById('gameOver');
            gameOverModal.style.display = 'block';

            // Update final scores and winner
            document.getElementById('finalPlayer1Avatar').src = window.currentUser.pfpUrl;
            document.getElementById('finalPlayer1Name').textContent = window.currentUser.displayName || `@${window.currentUser.username}`;

            document.getElementById('finalPlayer2Avatar').src = window.opponentUser.pfpUrl;
            document.getElementById('finalPlayer2Name').textContent = window.opponentUser.displayName || `@${window.opponentUser.username}`;

        window.updateUserInterface = function updateUserInterface() {

        // Initialize Farcaster SDK and User Data
        window.initializeFarcasterSDK = async function initializeFarcasterSDK() {
            try {
                console.log('🔄 Initializing Farcaster SDK...');
                let attempts = 0;
                while (!window.sdk && attempts < 20) {
                    await new Promise(resolve => setTimeout(resolve, 500));
                    attempts++;
                    if (!window.sdk && attempts === 5) {
                        await loadFarcasterSDK();
                    }
                }
                
                if (window.sdk && window.sdk.actions) {
                    try {
                        await window.sdk.actions.ready();
                        console.log("✅ Farcaster SDK initialized successfully - app fully loaded");
                    } catch (readyError) {
                        console.error('Failed to initialize Farcaster SDK:', readyError);
                        setTimeout(async () => {
                            try {
                                await window.sdk.actions.ready();
                                console.log('✅ Farcaster SDK initialized on retry');
                            } catch (retryError) {
                                console.error('❌ Farcaster SDK retry failed:', retryError);
                            }
                        }, 1000);
                    }
                }

                if (window.sdk) {
                    console.log('✅ window.sdk ready!');
                    try {
                        let user = null;
                        if (window.sdk && window.sdk.context) {
                            try {
                                const context = await window.sdk.context;
                                if (context.user) {
                                    user = { fid: context.user.fid, username: context.user.username, displayName: context.user.displayName, pfpUrl: context.user.pfpUrl };
                                }
                            } catch (e) {
                                console.log('👤 Context access failed:', e);
                            }
                        }

                        if (user) {
                            const userData = user;
                            if (userData) {
                                window.currentUser = { 
                                    username: userData.username || 'farcaster_user', 
                                    displayName: userData.displayName || userData.username || 'Farcaster User', 
                                    pfpUrl: userData.pfpUrl || userData.pfp || 'https://picsum.photos/100/100', 
                                    verified: userData.verified || false, 
                                    fid: userData.fid || Math.floor(Math.random() * 10000) 
                                };
                                console.log('✅ Current user set:', window.currentUser);
                                updateUserInterface();
                                return;
                            }
                        }
                    } catch (sdkError) {
                        console.log('⚠️ window.sdk error:', sdkError);
                    }
                }

                if (window.FarcasterFrame) {
                    try {
                        const sdk = await window.FarcasterFrame.init({ allowedOrigins: ['*'] });
                        let user = null;
                        if (sdk.getUser) { user = await sdk.getUser(); } else if (sdk.user) { user = sdk.user; } else if (window.farcaster && window.farcaster.user) { user = window.farcaster.user; }
                        if (user) {
                            window.currentUser = { username: user.username, displayName: user.displayName || user.username, pfpUrl: user.pfpUrl || user.pfp, verified: user.verified || false, fid: user.fid };
                            updateUserInterface();
                            return;
                        }
                    } catch (frameError) {
                        console.log('⚠️ FarcasterFrame error:', frameError);
                    }
                }
                
                // Fallback to default user if no SDK user is found
                window.currentUser = await window.getFarcasterUserData(); 
                updateUserInterface();

            } catch (error) {
                console.log('❌ Farcaster SDK fatal error:', error);
                window.currentUser = await window.getFarcasterUserData();
                updateUserInterface();
            }
        }

        window.initializeGame = async function initializeGame() {

            document.documentElement.style.setProperty('--neon-color', color);
            // Reapply glow based on the new color if needed
            document.documentElement.style.setProperty('--glow-green', `0 0 10px ${color}, 0 0 20px ${color}`);
        }

        const initialColor = getRandomNeonColor();
        applyNeonColor(initialColor);
        
        // Initialize game when page loads
        window.addEventListener('load', async () => {
            await initializeGame();
        });
        
        // Initialize audio on first user interaction (mobile requirement)
        document.addEventListener('touchstart', () => {
            console.log('🎵 Touch detected - enabling audio');
        }, { once: true });
        
        document.addEventListener('click', () => {
            console.log('🎵 Click detected - enabling audio');
        }, { once: true });
        
    </script>
</body>
</html>
