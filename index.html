    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary-color: #8B5CF6;
            --secondary-color: #06B6D4;
            --accent-color: #F59E0B;
            --success-color: #10B981;
            --danger-color: #EF4444;
            --dark-bg: #0F0F23;
            --card-bg: #1A1A2E;
            --text-primary: #FFFFFF;
            --text-secondary: #A1A1AA;
            --border-color: #27272A;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 20px 40px -10px rgba(0, 0, 0, 0.4);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #16213E 50%, var(--dark-bg) 100%);
            min-height: 100vh;
            height: 100vh;
            color: var(--text-primary);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 0;
        }
        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 100vw;
            max-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #gameCanvas {
            border: 3px solid var(--neon-color);
            border-radius: 15px;
            background: #001100;
            box-shadow: 0 0 25px var(--neon-color), inset 0 0 20px rgba(0, 255, 0, 0.1);
            width: 400px !important;
            height: 400px !important;
            max-width: 400px !important;
            max-height: 400px !important;
            min-width: 400px !important;
            min-height: 400px !important;
            display: block;
            margin: 20px;
        }
        
        /* Game started - square/circular canvas (Düzeltme: Dairesel alan geri getirildi) */
        .game-started #gameCanvas {
            width: 400px !important;
            height: 400px !important;
            max-width: 400px !important;
            max-height: 400px !important;
            min-width: 400px !important;
            min-height: 400px !important;
            border-radius: 50% !important; /* Çember şeklini geri getir */
        }
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        /* Beautiful Horizontal Scoreboard (Düzeltme: Mesafe azaltıldı) */
        .scoreboard-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: auto; /* Genişliği içeriğe göre ayarla */
            max-width: 90%;
            z-index: 20;
            display: none;
            margin-left: 0; /* Gereksiz margin kaldırıldı */
        }
        
        .scoreboard-container.show {
            display: block;
        }
        
        .scoreboard-rectangle {
            background: linear-gradient(135deg, #001100, #002200);
            border: 2px solid var(--neon-color);
            border-radius: 15px;
            padding: 15px 20px;
            display: flex;
            justify-content: center; /* space-between yerine center kullanıldı */
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            margin-bottom: 10px;
            gap: 15px; /* Skorkart öğeleri arasına boşluk eklendi */
        }
        
        .player-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .player-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px solid #00ff00;
            object-fit: cover;
            box-shadow: 0 0 8px #00ff00;
        }
        
        .player-avatar.player1 {
            border-color: #00ff00;
            box-shadow: 0 0 8px #00ff00;
        }
        
        .player-avatar.player2 {
            border-color: #ff0080;
            box-shadow: 0 0 8px #ff0080;
        }
        
        .player-name {
            color: var(--neon-color);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 16px;
        }
        
        .player-score {
            color: var(--neon-color);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 18px;
            min-width: 25px;
            text-align: center;
        }
        
        .score-divider {
            color: var(--neon-color);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 20px;
            margin: 0 10px; /* Boşluk azaltıldı */
        }
        
        .timer-container {
            text-align: center;
        }
        
        .timer-text {
            color: var(--neon-color);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 16px;
            background: rgba(0, 17, 0, 0.8);
            padding: 5px 15px;
            border-radius: 10px;
            border: 1px solid var(--neon-color);
        }
        .score-display {
            color: var(--neon-color);
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 0 10px var(--neon-color);
            background: rgba(0, 0, 0, 0.9);
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid var(--neon-color);
            backdrop-filter: blur(10px);
            min-width: 200px;
        }
        
        .player-info {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
        }
        
        .player-name {
            font-size: 14px;
            font-weight: 600;
            min-width: 60px;
        }
        
        .player-score {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent-color);
        }
        
        .vs-divider {
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            margin: 4px 0;
            opacity: 0.8;
        }
        .timer-display {
            color: var(--neon-color);
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px var(--neon-color);
            background: rgba(0, 0, 0, 0.9);
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid var(--neon-color);
            backdrop-filter: blur(10px);
        }
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #001100, #002200);
            color: var(--neon-color);
            padding: 30px;
            border-radius: 20px;
            border: 3px solid var(--neon-color);
            text-align: center;
            display: none;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 30px var(--neon-color);
            width: 90%;
            max-width: 400px;
            z-index: 1000;
        }
        
        .final-scoreboard {
            padding: 20px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        
        .final-player-section {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-direction: column;
            text-align: center;
        }
        
        .final-player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid #00ff00;
            object-fit: cover;
            box-shadow: 0 0 10px #00ff00;
        }
        
        .final-player-avatar.player1 {
            border-color: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }
        
        .final-player-avatar.player2 {
            border-color: #ff0080;
            box-shadow: 0 0 10px #ff0080;
        }
        
        .final-player-name {
            color: var(--neon-color);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 16px;
        }
        
        .final-player-score {
            color: var(--neon-color);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 24px;
            min-width: 30px;
            text-align: center;
        }
        
        .final-score-divider {
            color: var(--neon-color);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 28px;
            margin: 0 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .winner-display {
            margin: 20px 0;
        }
        
        .winner-display h3 {
            color: #ffd700;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 24px;
            text-shadow: 0 0 15px #ffd700;
            margin: 0;
        }
        
        .game-over-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .game-over h2 {
            margin: 0 0 20px 0;
            font-size: 32px;
            text-shadow: 0 0 15px var(--neon-color);
            font-weight: 700;
        }
        .restart-btn {
            background: linear-gradient(135deg, var(--neon-color), #00cc00);
            color: #000;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: 700;
            font-family: 'SF Pro Display', 'Helvetica Neue', 'Arial', sans-serif;
            letter-spacing: 0.8px;
            border-radius: 12px;
            cursor: pointer;
            margin: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 255, 0, 0.4);
            text-transform: uppercase;
        }
        .restart-btn:hover {
            background: linear-gradient(135deg, #00cc00, var(--neon-color));
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 255, 0, 0.6);
        }
        
        /* Game Mode Selection Styles */
        .game-mode-selection {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            color: var(--neon-color);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid var(--neon-color);
            text-align: center;
            z-index: 20;
            box-shadow: 0 0 30px var(--neon-color);
            backdrop-filter: blur(15px);
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .game-mode-selection h2 {
            margin: 0 0 30px 0;
            font-size: 32px;
            text-shadow: 0 0 15px var(--neon-color);
            font-weight: 700;
        }
        
        .user-info-card {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--neon-color);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        
        .user-info-content {
            display: flex;
            align-items: center;
            gap: 15px;
            justify-content: center;
        }
        
        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--neon-color);
        }
        
        .user-details h3 {
            margin: 0 0 5px 0;
            font-size: 20px;
            font-weight: 600;
        }
        
        .user-status {
            font-size: 14px;
            opacity: 0.8;
        }
        
        .mode-buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-direction: row;
            align-items: stretch;
        }
        
        .mode-btn {
            background: transparent;
            border: 2px solid var(--neon-color);
            color: var(--neon-color);
            padding: 25px 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 200px;
            flex: 1;
            max-width: 250px;
            text-align: center;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .mode-btn:hover {
            background: var(--neon-color);
            color: #000;
            box-shadow: 0 0 25px var(--neon-color);
            transform: translateY(-3px);
        }
        
        .mode-icon {
            font-size: 48px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px var(--neon-color));
        }
        
        .mode-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .mode-desc {
            font-size: 14px;
            opacity: 0.8;
            line-height: 1.4;
        }
        
        
        /* Hide canvas initially */
        #gameCanvas {
            display: none !important;
        }
        
        /* Show canvas when game starts */
        .game-started #gameCanvas {
            display: block !important;
        }
        
        /* Show game mode selection initially */
        .game-mode-selection {
            display: block;
        }
        
        /* Hide mode selection when game starts */
        .game-started .game-mode-selection {
            display: none !important;
        }
        
        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .game-container {
                padding: 5px;
            }
            
            #gameCanvas {
                width: min(90vw, 350px);
                height: min(90vh, 500px);
                margin: 10px;
                border-width: 2px;
            }
            
            .ui-overlay {
                top: 5px;
                left: 5px;
                right: 5px;
            }
            
            .score-display {
                font-size: 12px;
                padding: 6px 10px;
                min-width: 140px;
            }
            
            .player-name {
                font-size: 10px;
                min-width: 40px;
            }
            
            .player-score {
                font-size: 14px;
            }
            
            .timer-display {
                font-size: 16px;
                padding: 6px 10px;
            }
            
            .game-mode-selection {
                padding: 20px 15px;
                margin: 10px;
            }
            
            .game-mode-selection h2 {
                font-size: 20px;
            }
            
            .mode-buttons {
                flex-direction: column;
                gap: 12px;
            }
            
            .mode-btn {
                min-width: 180px;
                padding: 15px;
            }
            
            .mode-icon {
                font-size: 36px;
            }
            
            .mode-title {
                font-size: 16px;
            }
            
            .mode-desc {
                font-size: 12px;
            }
        }
        
        /* Extra small screens */
        @media (max-width: 480px) {
            #gameCanvas {
                width: min(95vw, 95vh, 300px);
                height: min(95vw, 95vh, 300px);
                margin: 5px;
            }
            
            .score-display {
                font-size: 10px;
                padding: 4px 8px;
                min-width: 120px;
            }
            
            .player-name {
                font-size: 9px;
                min-width: 35px;
            }
            
            .timer-display {
                font-size: 14px;
                padding: 4px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="ui-overlay">
            <div class="scoreboard-container">
                <div class="scoreboard-rectangle">
                    <div class="player-section">
                        <img id="player1Avatar" class="player-avatar" src="" alt="Player 1">
                        <span id="player1Name" class="player-name">Player 1</span>
                        <span id="score1" class="player-score">0</span>
                    </div>
                    <div class="score-divider">-</div>
                    <div class="player-section">
                        <span id="score2" class="player-score">0</span>
                        <span id="player2Name" class="player-name">Opponent</span>
                        <img id="player2Avatar" class="player-avatar" src="" alt="Player 2">
                    </div>
                </div>
                <div class="timer-container">
                    <span id="timer" class="timer-text">1:00</span>
                </div>
            </div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="game-mode-selection" id="gameModeSelection">
            <h2>🎮 Choose Game Mode</h2>
            
            <div class="user-info-card" id="userInfo">
                <div class="user-info-content">
                    <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
                    <div class="user-details">
                        <h3 id="userName">Loading...</h3>
                        <div id="userStatus" class="user-status">Connecting Farcaster account...</div>
                    </div>
                </div>
            </div>
            
            <div class="mode-buttons">
                <button class="mode-btn" onclick="startRandomFarcasterMatch()">
                    <div class="mode-icon">🎲</div>
                    <div class="mode-title">Random Farcaster Match</div>
                    <div class="mode-desc">Play with random Farcaster user</div>
                </button>
                <button class="mode-btn" onclick="startFarcasterDuel()">
                    <div class="mode-icon">⚔️</div>
                    <div class="mode-title">Farcaster Duel</div>
                    <div class="mode-desc">Challenge specific Farcaster user</div>
                </button>
            </div>
            
        </div>
        
        <div class="game-over" id="gameOver">
            <h2>🏆 Game Over! 🏆</h2>
            <div class="final-scoreboard">
                <div class="final-player-section">
                    <img id="finalPlayer1Avatar" class="final-player-avatar" src="" alt="Player 1">
                    <span id="finalPlayer1Name" class="final-player-name">You</span>
                </div>
                <div class="final-score-divider">
                    <span id="finalScore1" class="final-player-score">0</span>
                    <span>-</span>
                    <span id="finalScore2" class="final-player-score">0</span>
                </div>
                <div class="final-player-section">
                    <img id="finalPlayer2Avatar" class="final-player-avatar" src="" alt="Player 2">
                    <span id="finalPlayer2Name" class="final-player-name">Opponent</span>
                </div>
            </div>
            <div class="winner-display" id="winnerDisplay" style="display: none;">
                <h3 id="winnerText">🎉 WINNER! 🎉</h3>
            </div>
            <div class="game-over-buttons">
                <button class="restart-btn" onclick="restartGame()">🔄 Play Again</button>
                <button class="restart-btn" onclick="shareToFarcaster()">📤 Share Result</button>
            </div>
        </div>
    </div>
    
    <script>
        // Global variables
        window.currentUser = null;
        window.sdk = null;
        window.farcasterInitialized = false;
        
        // Load Farcaster SDK dynamically
        async function loadFarcasterSDK() {
            try {
                const { sdk } = await import('https://esm.sh/@farcaster/miniapp-sdk');
                window.sdk = sdk;
                console.log('✅ Farcaster SDK loaded:', sdk);
                return sdk;
            } catch (error) {
                console.error('❌ Failed to load Farcaster SDK:', error);
                return null;
            }
        }
        
        // Load SDK immediately

        window.startFarcasterDuel = async function() {
            console.log('⚔️ Starting Farcaster duel...');
            
            // Create search modal
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.8);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 1000;
            `;
            
            const searchBox = document.createElement('div');
            searchBox.style.cssText = `
                background: #001100;
                border: 2px solid var(--neon-color);
                border-radius: 15px;
                padding: 20px;
                width: 300px;
                max-width: 90vw;
            `;
            
            const title = document.createElement('h3');
            title.textContent = '⚔️ Farcaster Duel';
            title.style.cssText = `
                color: var(--neon-color);
                text-align: center;
                margin-bottom: 15px;
                font-family: 'Courier New', monospace;
            `;
            
            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = 'Enter Farcaster username...';
            input.style.cssText = `
                width: 100%;
                padding: 10px;
                background: #000;
                border: 1px solid var(--neon-color);
                border-radius: 5px;
                color: var(--neon-color);
                font-family: 'Courier New', monospace;
                margin-bottom: 10px;
            `;
            
            // Search button removed - using real-time search
            
            const closeBtn = document.createElement('button');
            closeBtn.textContent = 'Close';
            closeBtn.style.cssText = `
                width: 100%;
                padding: 10px;
                background: #333;
                color: var(--neon-color);
                border: 1px solid var(--neon-color);
                border-radius: 5px;
                font-family: 'Courier New', monospace;
                cursor: pointer;
            `;
            
            const results = document.createElement('div');
            results.id = 'search-results';
            results.style.cssText = `
                max-height: 200px;
                overflow-y: auto;
                margin-top: 10px;
            `;
            
            searchBox.appendChild(title);
            searchBox.appendChild(input);
            searchBox.appendChild(closeBtn);
            searchBox.appendChild(results);
            modal.appendChild(searchBox);
            document.body.appendChild(modal);
            
            // Search function
            const searchUsers = async (query) => {
                if (!query.trim()) return;
                
                console.log('🔍 Searching for user:', query);
                results.innerHTML = '<div style="color: var(--neon-color); text-align: center;">Searching...</div>';
                
                try {
                    const response = await fetch(`https://bouncingballs.ataskira1.workers.dev/search?q=${encodeURIComponent(query)}`);
                    const data = await response.json();
                    
                    console.log('🔍 Search response:', data);
                    
                    results.innerHTML = '';
                    
                    if (data.result && data.result.users && data.result.users.length > 0) {
                        data.result.users.forEach(user => {
                            const userDiv = document.createElement('div');
                            userDiv.style.cssText = `
                                padding: 10px;
                                border: 1px solid var(--neon-color);
                                border-radius: 5px;
                                margin-bottom: 5px;
                                cursor: pointer;
                                background: #000;
                                color: var(--neon-color);
                            `;
                            
                            userDiv.innerHTML = `
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <img src="${user.pfp_url || 'https://picsum.photos/40/40'}" 
                                         style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--neon-color);">
                                    <div>
                                        <div style="font-weight: bold; color: var(--neon-color);">${user.display_name || user.username}</div>
                                        <div style="color: #888; font-size: 12px;">@${user.username}</div>
                                        <div style="color: #666; font-size: 11px;">${user.follower_count || 0} followers</div>
                                    </div>
                                </div>
                            `;
                            
                            userDiv.onclick = () => {
                                console.log('🎯 Selected user:', user);
                                
                                window.opponentUser = {
                                    username: user.username,
                                    displayName: user.display_name || user.username,
                                    pfpUrl: user.pfp_url || 'https://picsum.photos/100/100',
                                    followerCount: user.follower_count,
                                    verified: user.power_badge || false,
                                    fid: user.fid
                                };
                                
                                document.body.removeChild(modal);
                                window.startGame();
                            };
                            
                            results.appendChild(userDiv);
                        });
                    } else {
                        results.innerHTML = '<div style="color: var(--neon-color); text-align: center;">No users found</div>';
                    }
                } catch (error) {
                    console.error('🔍 Search error:', error);
                    results.innerHTML = '<div style="color: red; text-align: center;">Search error: ' + error.message + '</div>';
                }
            };
            
            // Real-time search with debouncing
            let searchTimeout;
            input.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                const query = e.target.value.trim();
                if (query.length < 2) {
                    results.innerHTML = '';
                    return;
                }
                searchTimeout = setTimeout(() => {
                    searchUsers(query);
                }, 300); // 300ms delay
            });
            
            // Event listeners
            closeBtn.onclick = () => document.body.removeChild(modal);
        };

        ];

        function applyNeonColor(color) {
            document.documentElement.style.setProperty('--neon-color', color);

            const player1Avatar = document.querySelector('.player-avatar.player1');
