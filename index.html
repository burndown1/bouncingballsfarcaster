        function drawGoal() {
            // Goal attached to circle - goal rotates with circle

            const postWidth = 6;
            
            // Goal attached to circle - goal rotates with circle
            // Goal opening always faces outward from center
            ctx.save();
            ctx.translate(goalX, goalY);
            ctx.rotate(circleAngle + Math.PI/2); // Goal opening faces outside circle
            
            // Goal frame - Neon white effect
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = postWidth;
            ctx.shadowColor = '#ffffff';

            ctx.moveTo(-goalWidth/2, -goalHeight/2);
            ctx.lineTo(-goalWidth/2, goalHeight/2);
            ctx.stroke();

            ctx.moveTo(goalWidth/2, -goalHeight/2);
            ctx.lineTo(goalWidth/2, goalHeight/2);
            ctx.stroke();
            
            // Top post - attached to circle
            ctx.beginPath();
            ctx.moveTo(-goalWidth/2, -goalHeight/2);
            ctx.lineTo(goalWidth/2, -goalHeight/2);

            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1; // Thinned: 2 → 1
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 10; // Thinned: 15 → 10
            
            // Vertical net lines
            for (let i = 1; i < 6; i++) {
                const x = -goalWidth/2 + (goalWidth / 6) * i;
            ctx.beginPath();
                ctx.moveTo(x, -goalHeight/2);
                ctx.lineTo(x, goalHeight/2);
            ctx.stroke();
            }
            
            // Horizontal net lines

                const y = -goalHeight/2 + (goalHeight / 4) * i;

        // CPU control algorithm - Simple and working version

        function updateCPUControl(cpuBall) {
            // CPU click mechanics (same as player)
            cpuClickTimer++;
            if (cpuClickTimer >= cpuClickInterval) {
                // Simulate click to random point
                const randomX = circle.x + (Math.random() - 0.5) * circle.radius * 1.5;
                const randomY = circle.y + (Math.random() - 0.5) * circle.radius * 1.5;
                
                // CPU ball click effect (same as player)
                const dx = randomX - cpuBall.x;
                const dy = randomY - cpuBall.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < cpuBall.radius * 2) { // If close to CPU ball
                    cpuBall.vx = (randomX - circle.x) * 0.1;
                    cpuBall.vy = (randomY - circle.y) * 0.1;
                }
                
                // Reset timer and set new random interval
                cpuClickTimer = 0;
                cpuClickInterval = 60 + Math.random() * 120;
            }
            
            // Normal physics applied (gravity, friction etc. in updateBalls)
        }
        
        function updateBalls() {
            balls.forEach((ball, index) => {
                // CPU control (only for second ball)
                if (cpuControlled && index === 1) {
                    updateCPUControl(ball);
                }
                
                ball.vy += gravity;
                ball.x += ball.vx;
                ball.y += ball.vy;
                ball.vx *= friction;
                
                const dx = ball.x - circle.x;
                const dy = ball.y - circle.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance + ball.radius > circle.radius) {
                    const angle = Math.atan2(dy, dx);
                    ball.x = circle.x + Math.cos(angle) * (circle.radius - ball.radius);
                    ball.y = circle.y + Math.sin(angle) * (circle.radius - ball.radius);
                    
                    const normalX = dx / distance;
                    const normalY = dy / distance;
                    const dot = ball.vx * normalX + ball.vy * normalY;
                    
                    ball.vx -= 2 * dot * normalX * wallBounce;
                    ball.vy -= 2 * dot * normalY * wallBounce;
                    
                    // Screen shake effect
                    screenShake = 10;
                    
                    // Play boink sound when ball bounces off circle (with cooldown)
                    const currentTime = Date.now();
                    if (currentTime - lastBoinkTime > boinkCooldown) {
                        playBoinkSound();
                        lastBoinkTime = currentTime;
                    }
                }
                
                const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                
                // Limit maximum speed to prevent infinite acceleration
                if (speed > maxSpeed) {
                    ball.vx = (ball.vx / speed) * maxSpeed;
                    ball.vy = (ball.vy / speed) * maxSpeed;
                }
                
                if (speed < minSpeed) {
                    ball.vx += (Math.random() - 0.5) * 0.5;
                    ball.vy += (Math.random() - 0.5) * 0.5;
                }
            });
        }

        function checkCollisions() {
            const ball1 = balls[0];
            const ball2 = balls[1];
            const dx = ball2.x - ball1.x;
            const dy = ball2.y - ball1.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance < ball1.radius + ball2.radius && distance > 0) {
                // Simple collision response - no magnetic effect
                const tempVx = ball1.vx;
                const tempVy = ball1.vy;
                ball1.vx = ball2.vx * bounce;
                ball1.vy = ball2.vy * bounce;
                ball2.vx = tempVx * bounce;
                ball2.vy = tempVy * bounce;
                
                // Separate balls to prevent overlap
                const overlap = (ball1.radius + ball2.radius) - distance;
                const separationX = (dx / distance) * overlap * 0.5;
                const separationY = (dy / distance) * overlap * 0.5;
                
                ball1.x -= separationX;
                ball1.y -= separationY;
                ball2.x += separationX;
                ball2.y += separationY;
            }
        }
        
        function checkGoals() {
            // Goal on circle - goal rotates with circle
            const goalX = circle.x + Math.cos(circleAngle) * circle.radius; // On circle
            const goalY = circle.y + Math.sin(circleAngle) * circle.radius; // On circle
            const goalWidth = 60; // Reduced: 80 → 60
            const goalHeight = 40; // Reduced: 50 → 40
            
            balls.forEach(ball => {
                const inGoalX = ball.x >= goalX - goalWidth/2 && ball.x <= goalX + goalWidth/2;
                const inGoalY = ball.y >= goalY - goalHeight/2 && ball.y <= goalY + goalHeight/2;
                
                if (inGoalX && inGoalY) {
                    if (ball.team === 'juventus') {
                        score1++;
                        document.getElementById('player1Score').textContent = score1;
                    } else {
                        score2++;
                        document.getElementById('player2Score').textContent = score2;
                    }
                    
                    // Show goal text
                    goalText = 'GOOOAAAL!!!';
                    goalTextTimer = 60; // Show for 1 second
                    
                    // Play sound effect
                    playGoalSound();
                    
                    ball.x = circle.x + (Math.random() - 0.5) * 100;
                    ball.y = circle.y + (Math.random() - 0.5) * 100;
                    ball.vx = (Math.random() - 0.5) * 6;
                    ball.vy = (Math.random() - 0.5) * 6;
                }
            });
        }
        
        function updateTimer() {
            if (!gameRunning) return;
            timeLeft--;
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timerDisplay').textContent = minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
            if (timeLeft <= 0) {
                endGame();
            } else {
                setTimeout(updateTimer, 1000);
            }
        }
        
        function endGame() {
            // Give extra time in case of tie
            if (score1 === score2) {
                console.log('⚽ Tie! Adding extra 15 seconds...');
                timeLeft = 15; // 15 seconds extra time
                document.getElementById('timerDisplay').textContent = '0:15';
                document.getElementById('timerDisplay').style.color = '#ff6600'; // Orange color
                
                // Show extra time message
                const timerElement = document.getElementById('timerDisplay');
                timerElement.style.fontSize = '20px';
                timerElement.style.fontWeight = 'bold';
                
                // Restart timer
                setTimeout(updateTimer, 1000);
                return;
            }
            
            // Normal game end
            gameRunning = false;
            
            // Update Game Over screen with player info
            document.getElementById('finalPlayer1Score').textContent = score1;
            document.getElementById('finalPlayer2Score').textContent = score2;
            document.getElementById('finalPlayer1Name').textContent = document.getElementById('player1Name').textContent;
            document.getElementById('finalPlayer2Name').textContent = document.getElementById('player2Name').textContent;
            document.getElementById('finalPlayer1Avatar').src = document.getElementById('player1Avatar').src;
            document.getElementById('finalPlayer2Avatar').src = document.getElementById('player2Avatar').src;
            
            // Determine winner and update winner display
            let winnerName = '';
            if (score1 > score2) {
                winnerName = document.getElementById('player1Name').textContent.toUpperCase();
            } else {
                winnerName = document.getElementById('player2Name').textContent.toUpperCase();
            }
            document.getElementById('winnerDisplay').textContent = winnerName + ' WON!!!';
            
            document.getElementById('gameOver').style.display = 'block';
            
            // Reset timer color to normal
            document.getElementById('timerDisplay').style.color = currentNeonColor;
            document.getElementById('timerDisplay').style.fontSize = '18px';
            document.getElementById('timerDisplay').style.fontWeight = 'normal';
            
            // Play referee whistle when game ends
            console.log('🎶 Game ended, playing referee whistle...');
            setTimeout(() => {
                console.log('🎶 Playing referee whistle now...');
                playRefereeWhistle();
            }, 500);
        }
        
        function restartGame() {
            // Return to game mode selection
            document.querySelector('.game-container').classList.remove('game-started');
            document.getElementById('gameModeSelection').style.display = 'block';
            document.getElementById('gameOver').style.display = 'none';
            
            // Reset scores
            score1 = 0;
            score2 = 0;
            document.getElementById('player1Score').textContent = '0';
            document.getElementById('player2Score').textContent = '0';
            document.getElementById('timerDisplay').textContent = '1:00';
            
            // Reset timer style
            document.getElementById('timerDisplay').style.color = currentNeonColor;
            document.getElementById('timerDisplay').style.fontSize = '18px';
            document.getElementById('timerDisplay').style.fontWeight = 'normal';
            
            // Return balls to starting position
            balls[0].x = 150;
            balls[0].y = 200;
            balls[0].vx = 3;
            balls[0].vy = -2;
            balls[1].x = 250;
            balls[1].y = 200;
            balls[1].vx = -3;
            balls[1].vy = 2;
        }
        
        function shareToFarcaster() {
            if (!window.currentUser) {
                alert('User information could not be loaded!');
                return;
            }
            
            const winner = score1 > score2 ? window.currentUser.username : (opponentUser ? opponentUser.username : 'CPU');
            const message = `🏆 Farcaster Football Game! ${window.currentUser.username} ${score1} - ${score2} ${opponentUser ? opponentUser.username : 'CPU'}`;
            
            // Share with Farcaster Mini App SDK
            if (window.sdk) {
                try {
                    window.sdk.share({
                        text: message,
                        embeds: [{
                            url: window.location.href,
                            title: 'Farcaster Football Game',
                            description: `${winner} won!`,
                            image: {
                                url: 'https://bouncingballsfarcaster.netlify.app/app-icon-512.svg'
                            }
                        }]
                    }).then(() => {
                        console.log('✅ Shared to Farcaster!');
                        alert('Match result shared to Farcaster!');
                    }).catch(error => {
                        console.log('❌ Share error:', error);
                        // Fallback: Warpcast link
                        const url = 'https://warpcast.com/~/compose?text=' + encodeURIComponent(message);
                        window.open(url, '_blank');
                    });
                } catch (error) {
                    console.log('❌ SDK error:', error);
                    // Fallback: Warpcast link
            const url = 'https://warpcast.com/~/compose?text=' + encodeURIComponent(message);
            window.open(url, '_blank');
                }
            } else {
                // Fallback: Warpcast link
            const url = 'https://warpcast.com/~/compose?text=' + encodeURIComponent(message);
            window.open(url, '_blank');
            }
        }
        
        canvas.addEventListener('click', function(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            balls.forEach(ball => {
                const dx = x - ball.x;
                const dy = y - ball.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < ball.radius) {
                    ball.vx = (x - circle.x) * 0.1;
                    ball.vy = (y - circle.y) * 0.1;
                }
            });
        });
        
        async function initializeGame() {
            console.log('🎮 Initializing game...');
            
            // Farcaster Mini App initialization
            try {
                if (window.FarcasterFrame) {
                    await window.FarcasterFrame.init({
                        allowedOrigins: ['*']
                    });
                    console.log('✅ Farcaster Mini App SDK initialized');
                }
            } catch (error) {
                console.log('⚠️ Farcaster Mini App SDK not available:', error);
            }
            
            // Wait a bit for Farcaster context to load
            await new Promise(resolve => setTimeout(resolve, 1000));
            console.log('🔍 After wait - window.farcaster:', window.farcaster);
            
            // Get user data automatically (ChatGPT önerisi)
            try {
                const userData = await getFarcasterUserData();
                window.currentUser = userData;
                console.log('✅ User data loaded:', userData);
                
                if (userData && userData.username && userData.username !== 'testuser') {
                    document.getElementById('userStatus').textContent = `✅ Playing as @${userData.username}`;
                    console.log(`🎯 Takım adı = @${userData.username}`);
                    console.log(`🖼️ Profil fotoğrafı = ${userData.pfpUrl}`);
                    console.log('👤 Full user data:', userData);
                } else {
                    document.getElementById('userStatus').textContent = '🎮 Ready to play!';
                    console.log('⚠️ User data not available or test user:', userData);
                }
            } catch (error) {
                console.error('Error initializing:', error);
                document.getElementById('userStatus').textContent = '🎮 Ready to play!';
            }
        }
        
        // Select first random color when page loads
        const initialColor = getRandomNeonColor();
        applyNeonColor(initialColor);
        console.log('🎨 Initial neon color:', initialColor);
        
        // Initialize game when page loads
        window.addEventListener('load', async () => {
            await initializeGame();
        });
        
        // Initialize audio on first user interaction (mobile requirement)
        document.addEventListener('touchstart', () => {
            console.log('🎵 Touch detected - enabling audio');
        }, { once: true });
        
        document.addEventListener('click', () => {
            console.log('🎵 Click detected - enabling audio');
        }, { once: true });
        
    </script>
</body>
